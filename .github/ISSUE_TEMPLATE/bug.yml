name: "🐛 Bug / Incidencia"
description: "Algo no funciona como esperabas."
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: "¿Qué ha ocurrido?"
      description: "Describe el problema de forma clara."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "¿Qué esperabas que ocurriera?"
      description: "Indica el resultado esperado."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Pasos para reproducirlo"
      description: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Contexto adicional"
      description: "Cuándo ocurre, frecuencia, capturas o logs sin datos sensibles."
    validations:
      required: true
