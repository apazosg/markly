name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL'
        required: false
        default: 'https://markly.adriangp.com'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows --release
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}
          --dart-define=GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}

      - name: Package MSIX
        shell: pwsh
        run: |
          dart run msix:create
          $msix = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1
          Copy-Item $msix.FullName "markly-windows-${{ github.ref_name }}.msix"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-msix
          path: markly-windows-${{ github.ref_name }}.msix
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: >
          flutter build apk --release
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk markly-android-${{ github.ref_name }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: markly-android-${{ github.ref_name }}.apk
          retention-days: 7

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows MSIX
        uses: actions/download-artifact@v8
        with:
          name: windows-msix
          path: dist

      - name: Download Android APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/markly-windows-${{ github.ref_name }}.msix
            dist/markly-android-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: Markly ${{ github.ref_name }}
