name: Build & Release

on:
  push:
    branches:
      - main
      - 'feat/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL'
        required: false
        default: 'https://markly.adriangp.com'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      # En builds de tag, la versión embebida en el binario debe coincidir con el
      # tag (no con el pubspec) para que el aviso de actualización sea fiable.
      - name: Resolve version flag
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "flag=--build-name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows release
        # firebase_cpp_sdk trae un cmake_minimum_required < 3.5; CMake 4.x (runner)
        # eliminó esa compatibilidad. Forzamos la política mínima a 3.5.
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: >
          flutter build windows --release ${{ steps.ver.outputs.flag }}
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}
          --dart-define=GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}

      - name: Package portable ZIP
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: >
          Compress-Archive
          -Path build/windows/x64/runner/Release/*
          -DestinationPath markly-windows-${{ github.ref_name }}.zip

      - name: Upload Windows artifact
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: markly-windows-${{ github.ref_name }}.zip
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Resolve version flag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "flag=--build-name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        run: >
          flutter build apk --release ${{ steps.ver.outputs.flag }}
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/')
        run: cp build/app/outputs/flutter-apk/app-release.apk markly-android-${{ github.ref_name }}.apk

      - name: Upload Android artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: markly-android-${{ github.ref_name }}.apk
          retention-days: 7

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows portable
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: dist

      - name: Download Android APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/markly-windows-${{ github.ref_name }}.zip
            dist/markly-android-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
          name: Markly ${{ github.ref_name }}
