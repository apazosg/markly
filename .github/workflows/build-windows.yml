name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL'
        required: false
        default: 'https://markly.adriangp.com'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows --release
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}
          --dart-define=GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}

      - name: Package MSIX
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = if ($tag -match '^v(\d+\.\d+\.\d+)$') { "$($Matches[1]).0" } else { "0.1.0.0" }
          dart run msix:create --version $ver
          $msix = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1
          Copy-Item $msix.FullName "markly-windows-$tag.msix"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: markly-windows-${{ github.ref_name }}.msix
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: >
          flutter build apk --release
          --dart-define=API_BASE_URL=${{ inputs.api_base_url || 'https://markly.adriangp.com' }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk markly-android-${{ github.ref_name }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: markly-android-${{ github.ref_name }}.apk
          retention-days: 7

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-msix

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            markly-windows-${{ github.ref_name }}.msix
            markly-android-${{ github.ref_name }}.apk
          generate_release_notes: true
          name: Markly ${{ github.ref_name }}
