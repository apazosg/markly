name: recorder
description: "Meeting recorder with timestamped notes"
publish_to: 'none'
version: 0.1.4+5

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  record: ^7.0.0
  path_provider: ^2.1.5
  intl: ^0.19.0
  wakelock_plus: ^1.6.1
  share_plus: ^13.1.0
  path: ^1.9.1
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.0.0
  http: ^1.2.0
  crypto: ^3.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^10.1.0
  flutter_markdown_plus: ^1.0.7
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0
  msix: ^3.16.8

flutter_launcher_icons:
  android: "launcher_icon"
  min_sdk_android: 23
  image_path: "assets/branding/icon_1024.png"
  adaptive_icon_background: "#0D0E1F"
  adaptive_icon_foreground: "assets/branding/icon_fg_1024.png"
  windows:
    generate: true
    image_path: "assets/branding/icon_1024.png"
    icon_size: 48

msix_config:
  display_name: Markly
  publisher_display_name: Adrián Garrido Pazos
  identity_name: com.adriangp.markly
  publisher: CN=Adrián Garrido Pazos
  msix_version: 0.1.0.0
  logo_path: assets/branding/icon_1024.png
  capabilities: microphone, internetClient
  languages: es-es, en-us
  store: false
  sign_msix: false

flutter:
  uses-material-design: true
